services:
  account-service:
    build:
      context: .
      target: account
    ports:
      - "8001:8001"
    environment:
      ACCOUNT_DATABASE_URL: sqlite+aiosqlite:////data/account.db
      ACCOUNT_OTLP_ENDPOINT: otel-collector:4317
    volumes:
      - account-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      otel-collector:
        condition: service_started

  gateway:
    build:
      context: .
      target: gateway
    ports:
      - "8000:8000"
    environment:
      GATEWAY_DATABASE_URL: sqlite+aiosqlite:////data/gateway.db
      GATEWAY_ACCOUNT_SERVICE_URL: http://account-service:8001
      GATEWAY_OTLP_ENDPOINT: otel-collector:4317
      GATEWAY_QUEUE_PROCESSING_ENABLED: "true"
    volumes:
      - gateway-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      account-service:
        condition: service_healthy
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  account-data:
  gateway-data:
