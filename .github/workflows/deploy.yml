name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: |
          uv venv
          uv pip install -e ".[dev]"
      - run: uv run pytest -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      PROJECT_NAME: event-ledger
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URIs
        id: images
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "gateway_image=$REGISTRY/${PROJECT_NAME}-gateway:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "account_image=$REGISTRY/${PROJECT_NAME}-account:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "gateway_latest=$REGISTRY/${PROJECT_NAME}-gateway:latest" >> "$GITHUB_OUTPUT"
          echo "account_latest=$REGISTRY/${PROJECT_NAME}-account:latest" >> "$GITHUB_OUTPUT"
          echo "otel_collector_image=$REGISTRY/${PROJECT_NAME}-otel-collector:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "otel_collector_latest=$REGISTRY/${PROJECT_NAME}-otel-collector:latest" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repositories exist
        run: |
          for repo in gateway account otel-collector; do
            NAME="${PROJECT_NAME}-${repo}"
            if ! aws ecr describe-repositories --repository-names "$NAME" >/dev/null 2>&1; then
              aws ecr create-repository --repository-name "$NAME" \
                --image-scanning-configuration scanOnPush=true
            fi
          done

      - name: Build and push Docker images
        run: |
          docker build --target gateway -t "${{ steps.images.outputs.gateway_image }}" \
                       -t "${{ steps.images.outputs.gateway_latest }}" .
          docker build --target account  -t "${{ steps.images.outputs.account_image }}" \
                       -t "${{ steps.images.outputs.account_latest }}" .
          docker push "${{ steps.images.outputs.gateway_image }}"
          docker push "${{ steps.images.outputs.gateway_latest }}"
          docker push "${{ steps.images.outputs.account_image }}"
          docker push "${{ steps.images.outputs.account_latest }}"
          docker build -f Dockerfile.otel-collector \
            -t "${{ steps.images.outputs.otel_collector_image }}" \
            -t "${{ steps.images.outputs.otel_collector_latest }}" .
          docker push "${{ steps.images.outputs.otel_collector_image }}"
          docker push "${{ steps.images.outputs.otel_collector_latest }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Ensure Terraform state bucket exists
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="${PROJECT_NAME}-terraform-state-${ACCOUNT_ID}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api create-bucket --bucket "$BUCKET" --region "${AWS_REGION}"
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          fi
          echo "TF_STATE_BUCKET=$BUCKET" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: infrastructure/aws
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${PROJECT_NAME}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Import pre-created ECR repositories
        working-directory: infrastructure/aws
        run: |
          # CI may create the otel-collector repo before Terraform apply; import if needed.
          terraform import -input=false aws_ecr_repository.otel_collector \
            "${PROJECT_NAME}-otel-collector" || true

      - name: Terraform apply
        working-directory: infrastructure/aws
        run: |
          terraform apply -auto-approve \
            -var="gateway_image=${{ steps.images.outputs.gateway_image }}" \
            -var="account_image=${{ steps.images.outputs.account_image }}" \
            -var="otel_collector_image=${{ steps.images.outputs.otel_collector_image }}" \
            -var="github_repository=${{ github.repository }}"

      - name: Output gateway URL
        working-directory: infrastructure/aws
        run: |
          echo "## Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "Gateway URL: $(terraform output -raw gateway_url)" >> "$GITHUB_STEP_SUMMARY"
          echo "API Docs: $(terraform output -raw gateway_url)/docs" >> "$GITHUB_STEP_SUMMARY"
          echo "Jaeger UI: $(terraform output -raw jaeger_url)" >> "$GITHUB_STEP_SUMMARY"
